<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-tac-toe</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <main class="main">
    <div class="container">
      <div class="playspace" style="--pl-1:#ffff00;--pl-2:#ff00ff;">
        <article class="tictactoe">
          <h1 class="tictactoe__title">
            Tic-tac-toe
          </h1>
          <div class="tictactoe__text">
            Next: <span>X</span>
          </div>
          <div class="tictactoe__restart">
            <button class="tictactoe__restart-btn">
              Restart
            </button>
          </div>
          <div class="tictactoe__field">
            <table class="tictactoe__table">
              <tr class="tictactoe__table-row">
                <td class="tictactoe__table-row-cell" id="1">
                  <button class="tictactoe__table-row-cell-symbol _tic"></button>
                </td>
                <td class="tictactoe__table-row-cell" id="2">
                  <button class="tictactoe__table-row-cell-symbol _tac"></button>
                </td>
                <td class="tictactoe__table-row-cell" id="3">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
              </tr>
              <tr  class="tictactoe__table-row">
                <td class="tictactoe__table-row-cell" id="4">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
                <td class="tictactoe__table-row-cell" id="5">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
                <td class="tictactoe__table-row-cell" id="6">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
              </tr>
              <tr  class="tictactoe__table-row">
                <td class="tictactoe__table-row-cell" id="7">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
                <td class="tictactoe__table-row-cell" id="8">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
                <td class="tictactoe__table-row-cell" id="9">
                  <button class="tictactoe__table-row-cell-symbol"></button>
                </td>
              </tr>
            </table>
          </div>
          <ul class="tictactoe__settings">
            <li class="tictactoe__settings-row">
              <div class="tictactoe__settings-row-name">Player 1 color:</div>
              <input class="tictactoe__settings-row-color" type="color" value="#ffff00" id="player1Color">
            </li>
            <li class="tictactoe__settings-row">
              <div class="tictactoe__settings-row-name">Player 1 color:</div>
              <input class="tictactoe__settings-row-color"  type="color" value="#ff00ff" id="player2Color">
            </li>
          </ul>
        </article>
      </div>
    </div>
  </main>
</body>
</html>
